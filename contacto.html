<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contactos</title>
  <link rel="stylesheet" href="diseño4.css">
</head>
<body>
  <div class="contenido">
    <header>
      <h1>Contacto</h1>
      <h2>Estamos aquí para ayudarte</h2>
    </header>

    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
        <li><a href="ofertas.html">Ofertas</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>

    <main>
      <p>Puedes escribirnos a: contacto@mitienda.com</p>
      <p>O llenar el siguiente formulario:</p>

      <!-- Formulario gamer -->
      <form class="formulario-contacto">
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre">

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="+51 999 999 999">

        <label for="asunto">Asunto:</label>
        <input type="text" id="asunto" name="asunto" placeholder="Motivo de tu mensaje">

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí..."></textarea>

        <button type="submit">Enviar Mensaje</button>
      </form>
    </main>
  </div>

  <footer>
    <h3>Síguenos en nuestras redes sociales:</h3>
    <div class="redes">
      <a href="https://facebook.com" target="_blank">
        <img src="img/facebook.png" alt="Facebook">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="img/instagram.png" alt="Instagram">
      </a>
      <a href="https://tiktok.com" target="_blank">
        <img src="img/tiktok.png" alt="TikTok">
      </a>
      <a href="https://x.com" target="_blank">
        <img src="img/instagram.png" alt="X">
      </a>
    </div>
  </footer>
  <script>
  const links = document.querySelectorAll("nav a");
  links.forEach(link => {
    if (link.href === window.location.href) {
      link.classList.add("active");
    }
  });
</script>

</body>
</html>
